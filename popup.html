<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="device-width, initial-scale=1.0">
        <title>FocusFlow</title>
        <link rel="stylesheet" href="popup.css">s
    </head>

    <body>
        <div class="container">
            <header>
                <h1>⚡ FocusFlow</h1>
                <p>Your Productivity Companion</p>
            </header>

            <section class="features">
                <button id="summarizer">
                    📄
                    <span>Article Summarizer</span>
                </button>

                <button id="focus">
                    🎯
                    <span>Focus Mode</span>
                </button>

                <button id="notes">
                    📝
                    <span>Sticky Notes</span>
                </button>

                <button id="reminders">
                    🔔
                    <span>Reminders</span>
                </button>

                <button id="pomodoro">
                    ⏱️
                    <span>Pomodoro</span>
                </button>

                <button id="picker">
                    🎨
                    <span>Color Picker</span>
                </button>

                <button id="password">
                    🔐
                    <span>Password Strength</span>
                </button>

                <button id="darkmode">
                    🌙
                    <span>Dark Mode</span>
                </button>
            </section>
        </div>

        <script src="popup.js"></script>
    </body>
</html>
